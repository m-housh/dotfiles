# Font
font_family	"Fira Code"
font_size 18

enable_audio_bell no
allow_remote_control yes
remote_control_password "" *-colors

# Share SSH connection
share_connections yes

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_title_template "{index}: {title}"

# Keymaps
kitty_mod ctrl+shift

# Keymaps - Navigation
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# These mimic the muscle memory I have from tmux.
map ctrl+a>l next_tab
map ctrl+a>h previous_tab
map ctrl+a>r load_config_file

map kitty_mod+enter new_window_with_cwd

# Zen mode
map kitty_mod+z toggle_layout stack

# NOTE: Below can be changed automatically when using the theme picker, leave at bottom.
# 
# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
